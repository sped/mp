<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veux-tu m'épouser? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #FFB6D9 0%, #FFC8E0 50%, #FFD6E8 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.3);
            max-width: 600px;
        }

        h1 {
            font-size: 3em;
            color: #FF1493;
            margin-bottom: 20px;
        }

        .subtitle {
            font-size: 1.3em;
            color: #FF69B4;
            margin-bottom: 40px;
            font-style: italic;
        }

        .buttons-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2em;
            font-weight: bold;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #yesBtn {
            background: linear-gradient(135deg, #FF1493, #FF69B4);
            color: white;
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background: #FFB6D9;
            color: #FF1493;
            border: 2px solid #FF1493;
        }

        .success-message {
            display: none;
        }

        .success-message h2 {
            font-size: 2.5em;
            color: #FF1493;
            margin-bottom: 20px;
        }

        .emoji-rain {
            position: fixed;
            font-size: 3em;
            animation: fall 3s linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💕 Veux-tu m'épouser? 💕</h1>
        
        <p class="subtitle">Je ne serais plus ton pire cauchemar</p>

        <div id="question-section">
            <div class="buttons-container">
                <button id="yesBtn">❤️ OUI ❤️</button>
                <button id="noBtn">Non</button>
            </div>
        </div>

        <div class="success-message" id="successMessage">
            <h2>🎉 Félicitations! 🎉</h2>
            <p style="font-size: 1.5em; color: #FF69B4; margin: 20px 0;">
                Nous sommes officiellement MARIÉS! 👰💒🤵
            </p>
            <p style="font-size: 1.1em; color: #666; margin-top: 20px;">
                Je suis le plus heureux du monde! 
            </p>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const questionSection = document.getElementById('question-section');
        const successMessage = document.getElementById('successMessage');

        let noHoverCount = 0;

        yesBtn.addEventListener('click', function() {
            questionSection.style.display = 'none';
            successMessage.style.display = 'block';
            createConfetti();
        });

        noBtn.addEventListener('mouseenter', function() {
            noHoverCount++;
            
            const randomX = Math.random() * (window.innerWidth - 150);
            const randomY = Math.random() * (window.innerHeight - 100);
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
        });

        function createConfetti() {
            const colors = ['💕', '💍', '💐', '👰', '💒', '🤵', '💑'];
            
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const emoji = colors[Math.floor(Math.random() * colors.length)];
                    const x = Math.random() * window.innerWidth;
                    
                    const confetti = document.createElement('div');
                    confetti.className = 'emoji-rain';
                    confetti.textContent = emoji;
                    confetti.style.left = x + 'px';
                    
                    document.body.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 4000);
                }, i * 100);
            }
        }
    </script>
</body>
</html>
